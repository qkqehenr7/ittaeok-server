server:
  port: 80

spring:
  datasource:
    url: ${sm://db_url}
    username: ${sm://db_username}
    password: ${sm://db_password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
  docker:
    compose:
      lifecycle-management: start-only
  data:
    redis:
      host: ${sm://redis_host}
      port: ${sm://redis_port}
      username: default
      password: ${sm://redis_password}
      ssl:
        enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${sm://google_client_id}
            client-secret: ${sm://google_client_secret}
            redirect-uri: ${sm://google_redirect_uri}
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
              - profile
          kakao:
            client-name: kakao
            client-id: ${sm://kakao_client_id}
            client-secret: ${sm://kakao_client_secret}
            redirect-uri: ${sm://kakao_redirect_uri}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
springdoc:
  pathsToMatch: /api/**
jwt:
  expiration: 604800000
  refresh-expiration: 704800000
  secret: ${sm://jwt_secret}
google:
  calendar:
    client-id: ${sm://google_client_id}
    client-secret: ${sm://google_client_secret}
    redirect-uri: ${sm://google_calendar_redirect_uri}
  api:
    key: ${sm://google_api_key}
zoom:
  client-id: ${sm://zoom-client-id}
  client-secret: ${sm://zoom-client-secret}
  redirect-uri: ${sm://zoom-redirect-uri}
  refresh-token: ${sm://zoom-refresh-token}
kakao:
  middle-location:
    api-key: ${sm://kakao_api_key}
logging:
  level:
    org.springframework.cloud.gcp.secretmanager: DEBUG
    root: info
    org:
      hibernate:
        SQL: info
        type:
          descriptor:
            sql: info

url:
  backend: ${sm://server_domain}
front-server:
  domain-A: ${sm://domain_A}
  domain-B: ${sm://domain_B}
  redirect-url: ${sm://client_redirect_url}
